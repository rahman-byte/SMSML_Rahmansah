name: ML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install mlflow scikit-learn pandas cloudpickle
      - name: Run MLflow Project
        run: mlflow run Workflow-CI/MLProject --env-manager=local
      
      # Simpan artifak
      - name: Archive MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: mlruns/  