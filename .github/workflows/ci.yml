name: ML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install mlflow scikit-learn pandas cloudpickle
      - name: Run MLflow Project
        run: mlflow run Workflow-CI/MLProject --env-manager=local
      
      # Simpan artifak
      - name: Archive MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: mlruns/  


      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          
          # Debug: Lihat isi folder mlruns dulu
          echo "Isi folder mlruns:"
          find mlruns -maxdepth 4 -name "model"
          
          # Cari folder yang mengandung file 'MLmodel' untuk memastikan itu adalah model yang benar
          MODEL_PATH=$(find mlruns -name "MLmodel" | head -n 1 | xargs dirname)
          
          if [ -d "$MODEL_PATH" ]; then
            echo "Model valid ditemukan di: $MODEL_PATH"
            mkdir -p docker_build
            cp -r "$MODEL_PATH"/* docker_build/
            
            # Buat Dockerfile
            cat <<EOF > docker_build/Dockerfile
          FROM python:3.12-slim
          RUN pip install mlflow scikit-learn pandas
          COPY . /opt/ml/model/
          ENTRYPOINT ["mlflow", "models", "serve", "-m", "/opt/ml/model/", "--host", "0.0.0.0", "--port", "8080"]
          EOF
            
            docker build -t "${{ secrets.DOCKER_USERNAME }}/used-car-model" docker_build/
            docker push "${{ secrets.DOCKER_USERNAME }}/used-car-model"
          else
            echo "Error: Folder dengan file MLmodel tidak ditemukan."
            exit 1
          fi


        