name: Automated Preprocessing
on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pandas scikit-learn
      - name: Run Preprocessing
        run: python Eksperimen_SML_Rahmansah/preprocessing/automate_Rahmansah.py
      - name: Commit result
        run: |
          git config --global user.name "Rahmansah"
          git config --global user.email "rahmansah@gmail.com"
          git add Eksperimen_SML_Rahmansah/preprocessing/car_price_dataset_preprocessing.csv
          git commit -m "Auto-update processed dataset" || exit 0
          git push